name: build-wheels

on:
  workflow_dispatch:
    inputs:
      aria2_ref:
        description: "aria2 git tag, branch, or commit to build"
        required: true
        default: "release-1.37.0"
        type: string
  push:
    tags:
      - "v*"

env:
  ARIA2_REF: ${{ github.event.inputs.aria2_ref || 'release-1.37.0' }}

jobs:
  linux-manylinux:
    name: linux-manylinux-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Build manylinux_2_28 wheel
        env:
          ARIA2_MANYLINUX_ARCH: ${{ matrix.arch }}
          ARIA2_MANYLINUX_POLICY: manylinux_2_28
          ARIA2_STATIC_PROFILE: core
          ARIA2_WHEEL_PLATFORM_TAG: manylinux_2_28_${{ matrix.arch }}
        run: python3 scripts/build_linux_manylinux.py
      - name: Summarize manylinux target
        run: |
          {
            echo "### Linux manylinux"
            echo "- platform tag: manylinux_2_28_${{ matrix.arch }}"
            echo "- build image: quay.io/pypa/manylinux_2_28_${{ matrix.arch }}"
            echo "- smoke test: same manylinux container"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Smoke test manylinux wheel in manylinux container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            aria2-bin-linux-manylinux \
            sh -c 'PYTHON=$(ls -d /opt/python/cp3*-cp3*/bin/python | sort -V | tail -n1); "$PYTHON" -m pip install --no-cache-dir dist/aria2_bin-*.whl && "$PYTHON" -m aria2_bin._run --version'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-manylinux-${{ matrix.arch }}
          path: dist/*.whl

  linux-musl:
    name: linux-musl-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Build musllinux_1_2 wheel
        env:
          ARIA2_MUSL_ARCH: ${{ matrix.arch }}
          ARIA2_STATIC_PROFILE: core
          ARIA2_WHEEL_PLATFORM_TAG: musllinux_1_2_${{ matrix.arch }}
        run: python3 scripts/build_linux_musl.py
      - name: Summarize musllinux target
        run: |
          {
            echo "### Linux musllinux"
            echo "- platform tag: musllinux_1_2_${{ matrix.arch }}"
            echo "- build image: Alpine musl"
            echo "- smoke test: Alpine musl container"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Smoke test musllinux wheel in Alpine container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            aria2-bin-linux-musl \
            sh -c 'python3 -m pip install --no-cache-dir --break-system-packages dist/aria2_bin-*.whl && aria2c --version'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-musl-${{ matrix.arch }}
          path: dist/*.whl

  macos:
    name: macos-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - arch: x86_64
          #   runner: macos-13
          #   deployment_target: "10.13"
          #   platform_tag: macosx_10_13_x86_64
          # 暂时禁用这个
          - arch: arm64
            runner: macos-14
            deployment_target: "11.0"
            platform_tag: macosx_11_0_arm64
    runs-on: ${{ matrix.runner }}
    env:
      ARCH: ${{ matrix.arch }}
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
      ARIA2_STATIC_PROFILE: macos-core
      ARIA2_WHEEL_PLATFORM_TAG: ${{ matrix.platform_tag }}
      ARIA2_DEPS_PREFIX: ${{ github.workspace }}/build/macos-deps/prefix
      CFLAGS: "-arch ${{ matrix.arch }} -mmacosx-version-min=${{ matrix.deployment_target }} -Os"
      CXXFLAGS: "-arch ${{ matrix.arch }} -mmacosx-version-min=${{ matrix.deployment_target }} -Os -std=c++11"
      LDFLAGS: "-arch ${{ matrix.arch }} -mmacosx-version-min=${{ matrix.deployment_target }} -Wl,-dead_strip"
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          brew install autoconf automake libtool pkg-config gettext
          brew link --force gettext
      - name: Build static dependency prefix
        run: python3 scripts/build_macos_deps.py
      - name: Build wheel
        run: python3 scripts/build_wheel.py
      - name: Smoke test wheel
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install dist/aria2_bin-*.whl
          aria2c --version
          otool -L "$(python -c 'import aria2_bin._run; print(aria2_bin._run.binary_path())')"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.arch }}
          path: dist/*.whl

  windows:
    name: windows-amd64
    runs-on: windows-2022
    env:
      ARIA2_WHEEL_PLATFORM_TAG: win_amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: UCRT64
          update: true
          path-type: minimal
          install: >-
            base-devel
            git
            gettext-devel
            mingw-w64-ucrt-x86_64-autotools
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-expat
            mingw-w64-ucrt-x86_64-sqlite3
            mingw-w64-ucrt-x86_64-zlib
      - name: Build Windows wheel with MSYS2 UCRT64
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: python scripts/build_windows_msys2.py
      - name: Summarize Windows target
        shell: pwsh
        run: |
          @"
          ### Windows
          - platform tag: win_amd64
          - MSYSTEM: UCRT64
          - package prefix: mingw-w64-ucrt-x86_64
          "@ >> $env:GITHUB_STEP_SUMMARY
      - name: Smoke test Windows wheel on Windows
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install dist\aria2_bin-*.whl
          .\.venv\Scripts\aria2c.exe --version
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-amd64
          path: dist/*.whl
